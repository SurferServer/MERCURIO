databases:
  - name: mercurio-db
    plan: free
    databaseName: mercurio
    user: mercurio

services:
  - type: web
    name: mercurio
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mercurio-db
          property: connectionString
      - key: MERCURIO_JWT_SECRET
        generateValue: true
      - key: MERCURIO_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://mercurio.onrender.com
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MERCURIO_MAX_UPLOAD_MB
        value: "50"
      - key: MERCURIO_JWT_EXPIRE_HOURS
        value: "24"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
